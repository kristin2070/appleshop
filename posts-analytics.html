<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>📊 FB 粉專成效分析 · 燦坤 Apple Shop</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root {
    --bg: #f2f2f7;
    --card: #ffffff;
    --text: #1c1c1e;
    --muted: #8e8e93;
    --border: #e5e5ea;
    --accent: #007aff;
    --success: #34c759;
    --warning: #ff9500;
    --danger: #ff3b30;
    --purple: #af52de;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 20px rgba(0,0,0,0.04);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #000;
      --card: #1c1c1e;
      --text: #f0f0f0;
      --muted: #8e8e93;
      --border: #2c2c2e;
    }
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0 auto;
    padding: 24px 16px 60px;
    max-width: 1280px;
  }
  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 20px;
  }
  h1 { font-size: 24px; margin: 0 0 4px; }
  .subtitle { color: var(--muted); font-size: 13px; }
  .shop-select {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  select, button {
    padding: 9px 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--card);
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
  }
  button:hover { border-color: var(--accent); }
  button.primary { background: var(--accent); color: white; border-color: var(--accent); font-weight: 600; }
  button.danger  { color: var(--danger); }

  .status-tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    margin-left: 6px;
  }
  .tag-ok   { background: rgba(52,199,89,.15);  color: var(--success); }
  .tag-wait { background: rgba(142,142,147,.15); color: var(--muted); }

  /* 上傳區 */
  .upload-zone {
    background: var(--card);
    border: 2px dashed var(--border);
    border-radius: 14px;
    padding: 24px;
    text-align: center;
    margin-bottom: 20px;
    transition: all 0.2s;
    cursor: pointer;
  }
  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--accent);
    background: rgba(0,122,255,.05);
  }
  .upload-zone h3 { margin: 0 0 8px; font-size: 16px; }
  .upload-zone p { margin: 4px 0; font-size: 13px; color: var(--muted); }
  .upload-zone .csv-types {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .csv-tag {
    padding: 4px 12px;
    background: var(--bg);
    border-radius: 8px;
    font-size: 12px;
    color: var(--muted);
  }

  /* 空狀態 */
  .empty-state {
    background: var(--card);
    border-radius: 16px;
    padding: 60px 20px;
    text-align: center;
    box-shadow: var(--shadow);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state h2 { margin: 0 0 8px; font-size: 20px; }
  .empty-state p { color: var(--muted); font-size: 14px; margin: 4px 0; }

  /* KPI */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }
  .kpi {
    background: var(--card);
    border-radius: 14px;
    padding: 16px;
    box-shadow: var(--shadow);
  }
  .kpi-label {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .kpi-value {
    font-size: 26px;
    font-weight: 700;
    line-height: 1;
  }
  .kpi-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
  }

  .section {
    background: var(--card);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
  }
  .section-title {
    font-size: 16px;
    font-weight: 700;
    margin: 0 0 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  @media (max-width: 780px) { .grid-2 { grid-template-columns: 1fr; } }

  /* 趨勢圖 */
  .trend-chart {
    width: 100%;
    height: 240px;
  }

  /* Bar */
  .bar-row {
    display: grid;
    grid-template-columns: 100px 1fr 60px;
    gap: 10px;
    align-items: center;
    margin-bottom: 10px;
    font-size: 13px;
  }
  .bar-track {
    height: 22px;
    background: var(--bg);
    border-radius: 6px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 6px;
    display: flex;
    align-items: center;
    padding: 0 8px;
    color: white;
    font-size: 11px;
    font-weight: 600;
  }
  .bar-value { text-align: right; font-weight: 600; }

  .placeholder {
    padding: 40px 20px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    border: 1px dashed var(--border);
    border-radius: 12px;
  }
  .placeholder .big { font-size: 32px; margin-bottom: 8px; }

  .toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(120px);
    background: var(--success);
    color: white;
    padding: 12px 24px;
    border-radius: 24px;
    font-size: 14px;
    font-weight: 600;
    box-shadow: 0 8px 24px rgba(0,0,0,.4);
    transition: transform 0.3s;
    z-index: 100;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.err { background: var(--danger); }

  .data-info {
    font-size: 11px;
    color: var(--muted);
    margin-top: 10px;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
  }
  .range-btn {
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 16px;
    background: var(--bg);
    color: var(--text);
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
  }
  .range-btn:hover { border-color: var(--accent); }
  .range-btn.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
    font-weight: 600;
  }

  /* ============================
     📱 手機優化（≤ 640px）
     ============================ */
  @media (max-width: 640px) {
    body { padding: 16px 12px 60px; }
    h1 { font-size: 20px; }
    header { flex-direction: column; align-items: stretch; gap: 10px; }
    header > div:first-child { text-align: center; }
    .subtitle { font-size: 12px; }

    /* 工具列折成兩行 */
    .shop-select {
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }
    .shop-select > label:first-child { display: none; }
    #shop-select {
      flex: 1;
      min-width: 140px;
      font-size: 13px;
    }
    /* 平台按鈕縮短：只顯示 emoji */
    #platform-switch { order: 1; flex-basis: 100%; justify-content: center; }
    .pf-btn { font-size: 14px !important; padding: 6px 14px !important; }
    .pf-btn span.pf-text { display: none; }

    /* 合併模式 & 清除鈕 */
    #merge-mode { transform: scale(1.1); }

    /* 時間範圍改橫向滾動 */
    #date-filter-bar {
      overflow-x: auto;
      flex-wrap: nowrap !important;
      -webkit-overflow-scrolling: touch;
      padding: 10px 12px;
    }
    #date-filter-bar > span:first-child { flex-shrink: 0; }
    #date-filter-bar .range-btn { flex-shrink: 0; }
    #date-filter-bar > span:last-child {
      margin-left: 0 !important;
      flex-shrink: 0;
    }

    /* KPI 卡片：手機 2 欄 */
    .kpi-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .kpi { padding: 12px; }
    .kpi-value { font-size: 20px; }
    .kpi-label { font-size: 11px; }
    .kpi-sub { font-size: 10px; }

    /* Section */
    .section { padding: 14px; border-radius: 12px; }
    .section-title { font-size: 15px; }
    .grid-2 { gap: 12px; }

    /* Bar 圖 */
    .bar-row {
      grid-template-columns: 80px 1fr 50px;
      font-size: 12px;
      gap: 6px;
    }
    .bar-track { height: 20px; }
    .bar-fill { font-size: 10px; padding: 0 6px; }

    /* Google 關鍵字：手機改單欄 */
    .section > div[style*="grid-template-columns:2fr 1fr"] {
      display: block !important;
    }
    .section > div[style*="grid-template-columns:2fr 1fr"] > div:last-child {
      margin-top: 14px;
    }

    /* Google 評論分佈：手機直式 */
    .section > div[style*="grid-template-columns:1fr 300px"] {
      grid-template-columns: 1fr !important;
    }

    /* TOP 10 貼文：手機收合 */
    .post-header, .post-item,
    .section [style*="grid-template-columns:36px 1fr 300px"],
    .section [style*="grid-template-columns:36px 1fr 280px"] {
      grid-template-columns: 30px 1fr !important;
    }
    .post-header-stats,
    .section [style*="grid-template-columns:repeat(5,1fr)"][style*="text-align:right"] {
      display: none !important;
    }
    .post-stats-grid {
      grid-column: 1 / -1;
      margin-left: 40px;
      grid-template-columns: repeat(4, 1fr);
      font-size: 11px;
      margin-top: 6px;
    }

    /* Modal 全螢幕 */
    #kw-modal > div {
      max-width: 100% !important;
      max-height: 100vh !important;
      height: 100%;
      border-radius: 0 !important;
      padding: 20px !important;
    }
    #kw-textarea { min-height: 50vh !important; }

    /* 冠軍卡 & 商家資訊卡 */
    .champion-stats > div,
    .section [style*="linear-gradient"][style*="color:white"] > div {
      font-size: 12px;
    }

    /* 上傳區 */
    .upload-zone { padding: 16px; }
    .upload-zone h3 { font-size: 14px; }
    .upload-zone p { font-size: 12px; }

    /* Empty state */
    .empty-state { padding: 40px 16px; }
    .empty-state .icon { font-size: 36px; }
    .empty-state h2 { font-size: 16px; }
    .empty-state p { font-size: 13px; }

    /* 圖表 */
    .trend-chart { height: 200px; }

    /* Footer 資訊 */
    .data-info { flex-direction: column; gap: 4px; }
  }

  /* 平板 (641-780px) */
  @media (max-width: 780px) and (min-width: 641px) {
    .kpi-grid { grid-template-columns: repeat(3, 1fr); }
    .grid-2 { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>📊 FB 粉專成效分析</h1>
    <div class="subtitle">燦坤 Apple Shop · 內容策略決策後台</div>
  </div>
  <div class="shop-select">
    <label style="font-size:13px;color:var(--muted)">選擇店家：</label>
    <select id="shop-select"></select>
    <div id="platform-switch" style="display:flex;background:var(--bg);border-radius:20px;padding:3px;margin-left:8px">
      <button class="pf-btn active" data-pf="fb" style="border:none;padding:6px 12px;border-radius:16px;background:var(--accent);color:white;font-size:12px;font-weight:600;cursor:pointer">📘 Facebook</button>
      <button class="pf-btn" data-pf="ig" style="border:none;padding:6px 12px;border-radius:16px;background:transparent;color:var(--text);font-size:12px;font-weight:600;cursor:pointer">📷 Instagram</button>
      <button class="pf-btn" data-pf="google" style="border:none;padding:6px 12px;border-radius:16px;background:transparent;color:var(--text);font-size:12px;font-weight:600;cursor:pointer">🌟 Google</button>
    </div>
    <label style="font-size:13px;color:var(--muted);margin-left:8px;display:flex;align-items:center;gap:4px;cursor:pointer" title="開啟後：新 CSV 會與舊資料智慧合併（同日/同貼文以新的為準，舊資料保留）；關閉則完全覆蓋">
      <input type="checkbox" id="merge-mode"> 🔀 合併模式
    </label>
    <button id="export-btn" title="匯出所有資料為 JSON 備份">📤</button>
    <button id="import-btn" title="匯入 JSON 備份">📥</button>
    <input type="file" id="import-file" accept=".json" style="display:none">
    <button id="clear-btn" class="danger" title="清除此店家此平台的資料">🗑️</button>
  </div>
</header>

<!-- 時間範圍篩選 -->
<div id="date-filter-bar" style="background:var(--card);border-radius:14px;padding:14px 18px;margin-bottom:16px;box-shadow:var(--shadow);display:none;flex-wrap:wrap;gap:10px;align-items:center">
  <span style="font-size:13px;color:var(--muted);font-weight:600">📅 時間範圍：</span>
  <button class="range-btn active" data-range="all">全部</button>
  <button class="range-btn" data-range="7">近 7 天</button>
  <button class="range-btn" data-range="30">近 30 天</button>
  <button class="range-btn" data-range="90">近 3 個月</button>
  <button class="range-btn" data-range="180">近 6 個月</button>
  <button class="range-btn" data-range="365">近 1 年</button>
  <button class="range-btn" data-range="year-2025">2025 全年</button>
  <button class="range-btn" data-range="year-2026">2026 全年</button>
  <span style="margin-left:auto;display:flex;gap:6px;align-items:center">
    <span style="font-size:12px;color:var(--muted)">自訂：</span>
    <input type="date" id="date-from" style="padding:5px 8px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:12px;font-family:inherit">
    <span style="color:var(--muted)">~</span>
    <input type="date" id="date-to" style="padding:5px 8px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:12px;font-family:inherit">
    <button class="range-btn" data-range="custom" style="font-size:12px">套用</button>
  </span>
</div>

<!-- 上傳區 -->
<div class="upload-zone" id="upload-zone">
  <h3>📤 拖曳 CSV 檔到此處，或點擊選擇檔案</h3>
  <p>系統會自動辨識檔案類型並更新對應資料</p>
  <div class="csv-types">
    <span class="csv-tag">📅 每日互動 CSV</span>
    <span class="csv-tag">🎨 熱門內容格式 CSV</span>
    <span class="csv-tag">🔥 貼文明細 CSV（未來）</span>
  </div>
  <input type="file" id="file-input" accept=".csv" multiple style="display:none">
</div>

<div id="dashboard"></div>

<div class="toast" id="toast"></div>

<!-- 關鍵字輸入 Modal -->
<div id="kw-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;align-items:center;justify-content:center;padding:20px">
  <div style="background:var(--card);border-radius:16px;padding:24px;width:100%;max-width:560px;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.3)">
    <h2 style="margin:0 0 12px;font-size:20px">🔍 貼上關鍵字資料</h2>
    <div style="font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.6">
      直接從 Google 商家後台「效能 → 搜尋商家所用的字詞」<b>複製整個列表貼上</b>。<br>
      支援三行一組（序號 / 關鍵字 / 次數）或單行（關鍵字 [空格] 次數）。<br>
      會自動處理「3萬」「1,234」「1.5千」等格式。
    </div>
    <textarea id="kw-textarea" style="flex:1;min-height:280px;padding:12px;border:1px solid var(--border);border-radius:10px;background:var(--bg);color:var(--text);font-size:13px;font-family:-apple-system,monospace;resize:vertical;outline:none;line-height:1.6" placeholder="1.&#10;燦坤&#10;3萬&#10;2.&#10;apple&#10;7,205&#10;..."></textarea>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:14px">
      <button id="kw-cancel" class="filter-btn" style="padding:10px 20px">取消</button>
      <button id="kw-save" class="filter-btn" style="padding:10px 20px;background:var(--accent);color:white;border-color:var(--accent);font-weight:600">✅ 匯入</button>
    </div>
  </div>
</div>

<script>
// ===== 店家清單 =====
const SHOPS = [
  '五甲店', '自由店', '華榮店', '岡山店', '右昌店',
  '新光華店', '台南永華二店', '台南中華店', '斗六店'
];
const STORAGE_KEY = 'fb-analytics-v1';

// ===== 狀態管理 =====
let store = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
// 資料結構：store[店名] = { fb: {daily, formats, posts, ...}, ig: {posts, ...} }
SHOPS.forEach(s => {
  if (!store[s]) store[s] = {};
  if (!store[s].fb) store[s].fb = {};
  if (!store[s].ig) store[s].ig = {};
  if (!store[s].google) store[s].google = {};
  // 舊資料遷移：若店家頂層有 daily/formats/posts 屬於 FB
  ['daily','formats','posts','dailyUpdated','formatsUpdated','postsUpdated'].forEach(k => {
    if (store[s][k] !== undefined) {
      store[s].fb[k] = store[s][k];
      delete store[s][k];
    }
  });
});
let currentShop = localStorage.getItem('fb-analytics-current') || '五甲店';
let currentPlatform = localStorage.getItem('fb-analytics-platform') || 'fb';

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(store));
  localStorage.setItem('fb-analytics-current', currentShop);
  localStorage.setItem('fb-analytics-platform', currentPlatform);
}

// 取得當前資料
function getCurrentData() { return store[currentShop][currentPlatform] || {}; }

// ===== 渲染店家下拉 =====
function renderShopSelect() {
  const sel = document.getElementById('shop-select');
  sel.innerHTML = SHOPS.map(s => {
    const fb = store[s].fb || {}, ig = store[s].ig || {}, g = store[s].google || {};
    const hasFB = fb.daily || fb.formats || fb.posts;
    const hasIG = ig.posts;
    const hasG  = g.perf || g.reviews;
    const count = (hasFB?1:0) + (hasIG?1:0) + (hasG?1:0);
    let tag = '⏳';
    if (count === 3) tag = '✅';
    else if (count > 0) tag = '🔵';
    return `<option value="${s}" ${s===currentShop?'selected':''}>${tag} ${s}</option>`;
  }).join('');
}

// ===== Toast =====
function toast(msg, isErr = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isErr ? ' err' : '');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.className = 'toast', 2400);
}

// ===== CSV 解析 =====
function parseCSV(text) {
  // 移除 BOM
  text = text.replace(/^\uFEFF/, '').replace(/^sep=,\r?\n/, '');
  const rows = [];
  let row = [], cell = '', inQ = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], n = text[i+1];
    if (inQ) {
      if (c === '"' && n === '"') { cell += '"'; i++; }
      else if (c === '"') inQ = false;
      else cell += c;
    } else {
      if (c === '"') inQ = true;
      else if (c === ',') { row.push(cell); cell = ''; }
      else if (c === '\n') { row.push(cell); rows.push(row); row = []; cell = ''; }
      else if (c === '\r') {}
      else cell += c;
    }
  }
  if (cell || row.length) { row.push(cell); rows.push(row); }
  return rows;
}

// ===== 判斷 CSV 類型 =====
function detectCSVType(rows) {
  const flat = rows.flat().join('|');
  // Google 商家效能報表
  if (flat.includes('Google 搜尋') && flat.includes('路線') && flat.includes('來電')) return 'google-perf';
  // Google 商家基本資料
  if (flat.includes('主要類別') && flat.includes('星期一營業時間')) return 'google-profile';
  // IG 特徵：帳號用戶名稱 + 儲存次數
  if (flat.includes('帳號用戶名稱') || flat.includes('儲存次數')) return 'ig-posts';
  // FB 貼文明細
  if (flat.includes('貼文編號') && flat.includes('觀看次數') && flat.includes('觸及人數')) return 'posts';
  // FB 每日
  if (flat.includes('粉絲專頁名稱') && flat.includes('不重複用戶互動')) return 'daily';
  // FB 內容格式
  if (flat.includes('內容互動次數') && flat.includes('瀏覽次數')) return 'formats';
  return 'unknown';
}

// ===== 解析 Google 商家效能 CSV =====
function parseGooglePerf(rows) {
  // 找標題列（含「Google 搜尋 - 行動版」）與數字列
  const headerIdx = rows.findIndex(r => r.some(c => (c||'').includes('Google 搜尋')));
  if (headerIdx < 0) return null;
  const header = rows[headerIdx];
  // 找出數字列（跳過 header 與說明列，取有數字的那行）
  let dataRow = null;
  for (let i = headerIdx + 1; i < rows.length; i++) {
    const r = rows[i];
    if (r.some(c => /^\d+$/.test((c||'').trim()) && Number(c) > 0)) { dataRow = r; break; }
  }
  if (!dataRow) return null;
  const num = (key) => {
    const idx = header.findIndex(h => (h||'').trim() === key);
    if (idx < 0) return 0;
    return Number(dataRow[idx]) || 0;
  };
  const name = dataRow[header.findIndex(h => h.includes('商家名稱'))] || '';
  const addr = dataRow[header.findIndex(h => h === '地址' || h.trim() === '地址')] || '';
  return {
    businessName: name,
    address: addr,
    searchMobile:  num('Google 搜尋 - 行動版'),
    searchDesktop: num('Google 搜尋 - 電腦版'),
    mapMobile:     num('Google 地圖 - 行動版'),
    mapDesktop:    num('Google 地圖 - 電腦版'),
    calls:         num('來電'),
    messages:      num('訊息'),
    bookings:      num('預訂'),
    directions:    num('路線'),
    websiteClicks: num('網站點擊'),
  };
}

// ===== 解析 Google 商家基本資料 CSV =====
function parseGoogleProfile(rows) {
  const header = rows[0];
  const data = rows[1] || [];
  const get = (key) => {
    const idx = header.findIndex(h => (h||'').trim() === key || (h||'').includes(key));
    return idx >= 0 ? (data[idx] || '') : '';
  };
  return {
    businessName: get('商家名稱'),
    address: get('第 1 行地址'),
    phone: get('主要電話號碼'),

    hoursMon: get('星期一營業時間'),
    hoursTue: get('星期二營業時間'),
    hoursWed: get('星期三營業時間'),
    hoursThu: get('星期四營業時間'),

}

// ===== 解析 IG 貼文明細 CSV =====
function parseIGPosts(rows) {
  const header = rows[0];
  const idx = {
    id:       header.findIndex(h => h.includes('貼文編號')),
    desc:     header.findIndex(h => h === '說明' || h.trim() === '說明'),
    duration: header.findIndex(h => h.includes('時間長度')),
    time:     header.findIndex(h => h.includes('發佈時間')),
    link:     header.findIndex(h => h.includes('永久連結')),
    type:     header.findIndex(h => h.includes('貼文類型')),
    views:    header.findIndex(h => h.includes('瀏覽次數')),
    reach:    header.findIndex(h => h.includes('觸及人數')),
    likes:    header.findIndex(h => h.includes('按讚')),
    share:    header.findIndex(h => h === '分享' || h.trim() === '分享'),
    follow:   header.findIndex(h => h.includes('追蹤人數')),
    comment:  header.findIndex(h => h.includes('留言')),
    save:     header.findIndex(h => h.includes('儲存次數')),
  };
  const data = [];
  for (let i = 1; i < rows.length; i++) {
    const r = rows[i];
    if (!r[idx.id]) continue;
    const views = Number(r[idx.views]) || 0;
    const reach = Number(r[idx.reach]) || 0;
    const likes = Number(r[idx.likes]) || 0;
    const comment = Number(r[idx.comment]) || 0;
    const share = Number(r[idx.share]) || 0;
    const save = Number(r[idx.save]) || 0;
    const total = likes + comment + share + save;
    const desc = r[idx.desc] || '';
    // IG 貼文沒有標題，取說明前 60 字當標題
    const title = desc.replace(/[\r\n]+/g, ' ').slice(0, 80) || '(無說明)';
    data.push({
      id: r[idx.id],
      title,
      time: r[idx.time],
      type: (r[idx.type] || '').replace('IG ', '').trim() || '其他',
      link: r[idx.link],
      views, reach,
      likes, comment, share, save,
      total,
      duration: Number(r[idx.duration]) || 0,
      follow: Number(r[idx.follow]) || 0,
      rate: reach ? +(total/reach*100).toFixed(1) : 0,
      // IG 特有：Reels 觀看率（觀看/觸及）
      reelRate: reach && views ? +(views/reach*100).toFixed(0) : 0,
    });
  }
  data.sort((a,b) => b.total - a.total);
  return data;
}

// ===== 解析貼文明細 CSV =====
function parsePosts(rows) {
  const header = rows[0];
  const idx = {
    id:      header.findIndex(h => h.includes('貼文編號')),
    title:   header.findIndex(h => h === '標題' || h.trim() === '標題'),
    time:    header.findIndex(h => h.includes('發佈時間')),
    type:    header.findIndex(h => h.includes('貼文類型')),
    link:    header.findIndex(h => h.includes('永久連結')),
    views:   header.findIndex(h => h.includes('觀看次數')),
    reach:   header.findIndex(h => h.includes('觸及人數')),
    total:   header.findIndex(h => h.includes('心情、留言和分享次數')),
    react:   header.findIndex(h => h === '心情數' || h.trim() === '心情數'),
    comment: header.findIndex(h => h === '留言' || h.trim() === '留言'),
    share:   header.findIndex(h => h === '分享' || h.trim() === '分享'),
    click:   header.findIndex(h => h.includes('總點擊次數')),
  };
  const data = [];
  for (let i = 1; i < rows.length; i++) {
    const r = rows[i];
    if (!r[idx.id]) continue;
    const views = Number(r[idx.views]) || 0;
    const reach = Number(r[idx.reach]) || 0;
    const total = Number(r[idx.total]) || 0;
    data.push({
      id:      r[idx.id],
      title:   r[idx.title] || '(無標題)',
      time:    r[idx.time],
      type:    r[idx.type] || '其他',
      link:    r[idx.link],
      views, reach,
      total,
      react:   Number(r[idx.react]) || 0,
      comment: Number(r[idx.comment]) || 0,
      share:   Number(r[idx.share]) || 0,
      click:   Number(r[idx.click]) || 0,
      rate:    reach ? +(total/reach*100).toFixed(1) : 0,
    });
  }
  data.sort((a,b) => b.total - a.total); // 依總互動排序
  return data;
}

// ===== 解析每日 CSV =====
function parseDaily(rows) {
  const header = rows[0];
  const dateIdx = header.findIndex(h => h.includes('日期'));
  const interactIdx = header.findIndex(h => h.includes('不重複用戶互動'));
  const negIdx = header.findIndex(h => h === '整體負面意見' || h.trim() === '整體負面意見');
  const data = [];
  for (let i = 1; i < rows.length; i++) {
    const r = rows[i];
    if (!r[dateIdx]) continue;
    data.push({
      date: r[dateIdx],
      interact: Number(r[interactIdx]) || 0,
      negative: Number(r[negIdx]) || 0,
    });
  }
  // 依日期排序
  data.sort((a,b) => new Date(a.date) - new Date(b.date));
  return data;
}

// ===== 解析格式 CSV =====
function parseFormats(rows) {
  const result = { interactions: {}, views: {}, published: {} };
  let mode = null;
  for (const r of rows) {
    const first = (r[0] || '').trim();
    if (first === '內容互動次數') { mode = 'i'; continue; }
    if (first === '瀏覽次數')     { mode = 'v'; continue; }
    if (first === '已發佈的內容') { mode = 'p'; continue; }
    if (!mode || !first) continue;
    // 這行如果全是文字 → 是標題列，下一行是數字
    const isNumeric = r.slice(1).some(x => /^\d+$/.test((x||'').trim()));
    if (!isNumeric) {
      // 這是標題列，暫存
      mode = mode + ':' + r.filter(Boolean).join('|');
    } else {
      const [type, headers] = mode.split(':');
      const cols = headers.split('|');
      const target = type === 'i' ? result.interactions : type === 'v' ? result.views : result.published;
      r.filter(Boolean).forEach((v, idx) => {
        if (cols[idx]) target[cols[idx]] = Number(v) || 0;
      });
      mode = null;
    }
  }
  return result;
}

// ===== 處理上傳 =====
async function handleFiles(files) {
  const merge = document.getElementById('merge-mode').checked;
  let success = 0, fail = 0, mergedInfo = [], failNames = [], autoSwitched = null;
  for (const file of files) {
    try {
      const text = await file.text();
      const rows = parseCSV(text);
      const type = detectCSVType(rows);
      console.log(`[上傳] ${file.name} → 辨識為: ${type}`);
      const fb = store[currentShop].fb;
      const ig = store[currentShop].ig;

      if (type === 'daily') {
        const parsed = parseDaily(rows);
        if (merge && fb.daily) {
          const map = new Map(fb.daily.map(x => [x.date, x]));
          parsed.forEach(x => map.set(x.date, x));
          fb.daily = [...map.values()].sort((a,b) => new Date(a.date) - new Date(b.date));
          mergedInfo.push(`FB 每日：${map.size} 天`);
        } else fb.daily = parsed;
        fb.dailyUpdated = new Date().toISOString();
        success++; if (!autoSwitched) autoSwitched = 'fb';
      } else if (type === 'formats') {
        fb.formats = parseFormats(rows);
        fb.formatsUpdated = new Date().toISOString();
        success++; if (!autoSwitched) autoSwitched = 'fb';
      } else if (type === 'posts') {
        const parsed = parsePosts(rows);
        if (merge && fb.posts) {
          const map = new Map(fb.posts.map(x => [x.id, x]));
          parsed.forEach(x => map.set(x.id, x));
          fb.posts = [...map.values()].sort((a,b) => b.total - a.total);
          mergedInfo.push(`FB 貼文：${map.size} 則`);
        } else fb.posts = parsed;
        fb.postsUpdated = new Date().toISOString();
        success++; if (!autoSwitched) autoSwitched = 'fb';
      } else if (type === 'ig-posts') {
        const parsed = parseIGPosts(rows);
        if (merge && ig.posts) {
          const map = new Map(ig.posts.map(x => [x.id, x]));
          parsed.forEach(x => map.set(x.id, x));
          ig.posts = [...map.values()].sort((a,b) => b.total - a.total);
          mergedInfo.push(`IG 貼文：${map.size} 則`);
        } else ig.posts = parsed;
        ig.postsUpdated = new Date().toISOString();
        success++; if (!autoSwitched) autoSwitched = 'ig';
      } else if (type === 'google-perf') {
        const parsed = parseGooglePerf(rows);
        if (!parsed) { failNames.push(file.name); fail++; continue; }
        store[currentShop].google.perf = parsed;
        store[currentShop].google.perfUpdated = new Date().toISOString();
        // 若基本資料尚未設定，順便存名稱地址
        if (!store[currentShop].google.profile) {
          store[currentShop].google.profile = { businessName: parsed.businessName, address: parsed.address };
        }
        success++; if (!autoSwitched) autoSwitched = 'google';
      } else if (type === 'google-profile') {
        store[currentShop].google.profile = parseGoogleProfile(rows);
        store[currentShop].google.profileUpdated = new Date().toISOString();
        success++; if (!autoSwitched) autoSwitched = 'google';
      } else {
        failNames.push(file.name);
        fail++;
      }
    } catch (e) {
      console.error('[上傳失敗]', file.name, e);
      failNames.push(file.name + '(' + e.message + ')');
      fail++;
    }
  }
  // 自動切換到剛上傳的平台
  if (autoSwitched && autoSwitched !== currentPlatform) {
    currentPlatform = autoSwitched;
    document.querySelectorAll('.pf-btn').forEach(b => {
      const active = b.dataset.pf === currentPlatform;
      b.classList.toggle('active', active);
      b.style.background = active ? 'var(--accent)' : 'transparent';
      b.style.color = active ? 'white' : 'var(--text)';
    });
  }
  save();
  render();
  if (success) {
    const modeTag = merge ? '🔀 合併' : '📥 覆蓋';
    const detail = mergedInfo.length ? ` · ${mergedInfo.join(' · ')}` : '';
    toast(`✅ ${modeTag}｜匯入 ${success} 個檔案${fail ? `（失敗 ${fail}）` : ''}${detail}`);
  } else if (fail) {
    toast(`❌ 無法辨識 ${fail} 個檔案：${failNames.join(', ')}`, true);
  }
}

// ===== 時間篩選狀態 =====
let currentRange = { type: 'all' }; // {type:'all'} | {type:'days',n:30} | {type:'year',y:2025} | {type:'custom',from,to}

function getFilterDates() {
  if (currentRange.type === 'all') return null;
  const now = new Date();
  if (currentRange.type === 'days') {
    const from = new Date(now); from.setDate(from.getDate() - currentRange.n);
    return { from, to: now };
  }
  if (currentRange.type === 'year') {
    return { from: new Date(currentRange.y, 0, 1), to: new Date(currentRange.y, 11, 31, 23, 59, 59) };
  }
  if (currentRange.type === 'custom') {
    return { from: new Date(currentRange.from), to: new Date(currentRange.to + 'T23:59:59') };
  }
  return null;
}

function filterDataByRange(data) {
  const r = getFilterDates();
  if (!r) return data; // 全部
  const filtered = { ...data };
  if (data.daily) {
    filtered.daily = data.daily.filter(x => {
      const d = new Date(x.date);
      return d >= r.from && d <= r.to;
    });
  }
  if (data.posts) {
    filtered.posts = data.posts.filter(x => {
      const d = new Date(x.time);
      return d >= r.from && d <= r.to;
    });
  }
  // formats 是總計，無法按日期過濾 → 有選範圍就不顯示
  if (r && data.formats) filtered.formats = null;
  return filtered;
}

function parseKeywordsInput(input) {
  const rawLines = input.split('\n').map(l => l.trim()).filter(Boolean);
  const isNumberLine = (l) => /^\d+[.、]$/.test(l);
  const hasNumberedLines = rawLines.some(isNumberLine);
  const parsed = [];

  if (hasNumberedLines) {
    // 以序號行為分隔符
    const groups = [];
    let current = [];
    for (const line of rawLines) {
      if (isNumberLine(line)) {
        if (current.length) groups.push(current);
        current = [];
      } else {
        current.push(line);
      }
    }
    if (current.length) groups.push(current);
    for (const grp of groups) {
      if (grp.length < 2) continue;
      const count = parseCount(grp[grp.length - 1]);
      const word = grp.slice(0, -1).join(' ').trim();
      if (word && count) parsed.push({ word, count });
    }
  } else {
    // 單行格式
    for (const line of rawLines) {
      const clean = line.replace(/^\d+[.、]\s*/, '');
      const parts = clean.split(/\s+/).filter(Boolean);
      if (parts.length < 2) continue;
      const countStr = parts.pop();
      const word = parts.join(' ');
      const count = parseCount(countStr);
      if (word && count) parsed.push({ word, count });
    }
  }
  parsed.sort((a,b) => b.count - a.count);
  return parsed;
}


// 解析次數字串（支援 3萬、1.5千、1,234 等格式）
function parseCount(str) {
  if (!str) return 0;
  let s = String(str).replace(/,/g, '').trim();
  if (/萬/.test(s)) return Math.round(parseFloat(s) * 10000);
  if (/千/.test(s)) return Math.round(parseFloat(s) * 1000);
  const n = Number(s);
  return isNaN(n) ? 0 : Math.round(n);
}

function openReviewLineModal() {

  const rating = prompt('⭐ 星等（1~5）：', '5');
  if (rating === null) return;
  const date = prompt('📅 日期（YYYY-MM-DD）：', new Date().toISOString().slice(0,10));
  if (date === null) return;
  const text = prompt('💬 評論內容：');
  if (text === null) return;
  const repliedYN = confirm('✅ 已經回覆過了嗎？（按確定 = 已回覆，取消 = 未回覆）');

  const g = store[currentShop].google;
  if (!g.reviews) g.reviews = [];
  g.reviews.push({
    author: author.trim() || '匿名',
    rating: Number(rating) || 0,
    date,
    text: text.trim(),

  });

  toast('✅ 已新增評論');
}

// ===== SVG 折線圖 =====
function drawTrend(data) {
  const svg = document.getElementById('trend-svg');
  if (!svg) return;
  const rect = svg.getBoundingClientRect();
  const W = rect.width, H = rect.height;
  const pad = { l: 40, r: 20, t: 20, b: 40 };
  const w = W - pad.l - pad.r, h = H - pad.t - pad.b;

  const max = Math.max(...data.map(d => d.interact), 5);
  const step = w / Math.max(data.length - 1, 1);

  const pts = data.map((d, i) => ({
    x: pad.l + i * step,
    y: pad.t + h - (d.interact / max) * h,
    d
  }));

  const path = pts.map((p,i) => (i?'L':'M') + p.x.toFixed(1) + ',' + p.y.toFixed(1)).join(' ');
  const area = path + ` L${pts[pts.length-1].x.toFixed(1)},${pad.t+h} L${pts[0].x.toFixed(1)},${pad.t+h} Z`;

  // Y 軸刻度
  const ySteps = 4;
  let yAxis = '';
  for (let i = 0; i <= ySteps; i++) {
    const val = Math.round(max * i / ySteps);
    const y = pad.t + h - (i/ySteps)*h;
    yAxis += `<line x1="${pad.l}" x2="${W-pad.r}" y1="${y}" y2="${y}" stroke="var(--border)" stroke-dasharray="2,3"/>`;
    yAxis += `<text x="${pad.l-6}" y="${y+4}" text-anchor="end" font-size="10" fill="var(--muted)">${val}</text>`;
  }

  // X 軸日期（顯示幾個）
  const labelCount = Math.min(6, data.length);
  let xAxis = '';
  for (let i = 0; i < labelCount; i++) {
    const idx = Math.round(i * (data.length-1) / (labelCount-1));
    const p = pts[idx];
    xAxis += `<text x="${p.x}" y="${H-pad.b+16}" text-anchor="middle" font-size="10" fill="var(--muted)">${data[idx].date.slice(0,5)}</text>`;
  }

  svg.innerHTML = `
    ${yAxis}
    ${xAxis}
    <defs>
      <linearGradient id="gr" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#007aff" stop-opacity="0.4"/>
        <stop offset="100%" stop-color="#007aff" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <path d="${area}" fill="url(#gr)"/>
    <path d="${path}" fill="none" stroke="#007aff" stroke-width="2"/>
    ${pts.map(p => `<circle cx="${p.x}" cy="${p.y}" r="3" fill="#007aff">
      <title>${p.d.date}：${p.d.interact} 次互動${p.d.negative?` · ⚠️${p.d.negative} 負評`:''}</title>
    </circle>`).join('')}
  `;
}

});

// ===== 匯入 JSON 備份 =====
document.getElementById('import-btn').addEventListener('click', () => {
  document.getElementById('import-file').click();
});
document.getElementById('import-file').addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file) return;
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    if (!data.store) throw new Error('備份檔格式錯誤');
    const mode = confirm(
      '📥 匯入備份\n\n' +
      '按「確定」= 合併：加到現有資料上（相同店家以備份為準）\n' +
      '按「取消」= 覆蓋：完全取代目前所有資料\n\n' +
      '（新裝置第一次匯入時兩者相同）'
    );
    if (mode) {
      Object.keys(data.store).forEach(shop => {
        if (!store[shop]) store[shop] = { fb:{}, ig:{}, google:{} };
        ['fb','ig','google'].forEach(pf => {
          if (data.store[shop]?.[pf]) {
            store[shop][pf] = { ...(store[shop][pf] || {}), ...data.store[shop][pf] };
          }
        });
      });
    } else {
      store = data.store;
    }
    save();
    render();
    toast(`✅ 已匯入備份（${mode ? '合併' : '覆蓋'}模式）`);
  } catch (err) {
    console.error(err);
    toast('❌ 匯入失敗：' + err.message, true);
  }
  e.target.value = '';
});

  g.keywordsUpdated = new Date().toISOString();
  save();
  document.getElementById('kw-modal').style.display = 'none';
  render();
  toast(`✅ 已匯入 ${parsed.length} 個關鍵字`);
});

const uz = document.getElementById('upload-zone');
const fi = document.getElementById('file-input');
uz.addEventListener('click', () => fi.click());
fi.addEventListener('change', e => handleFiles(e.target.files));

// 讓整個視窗都能接收拖曳（避免掉到空白區被瀏覽器直接打開）
['dragenter','dragover'].forEach(ev => {
  window.addEventListener(ev, e => {
    e.preventDefault();
    e.stopPropagation();
    uz.classList.add('dragover');
  });
});
['dragleave','drop'].forEach(ev => {
  window.addEventListener(ev, e => {
    e.preventDefault();
    e.stopPropagation();
    // 只有真的離開視窗才移除高亮
    if (ev === 'dragleave' && (e.clientX > 0 || e.clientY > 0)) return;
    uz.classList.remove('dragover');
  });
});
window.addEventListener('drop', e => {
  e.preventDefault();
  uz.classList.remove('dragover');
  const files = e.dataTransfer?.files;
  if (files && files.length) handleFiles(files);
});

window.addEventListener('resize', () => {
  const d = getCurrentData();
  if (d.daily) drawTrend(filterDataByRange(d).daily);
});

// ===== 時間範圍按鈕 =====
document.querySelectorAll('.range-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const r = btn.dataset.range;
    if (r === 'custom') {
      const from = document.getElementById('date-from').value;
      const to   = document.getElementById('date-to').value;
      if (!from || !to) { toast('請選日期範圍', true); return; }
      currentRange = { type: 'custom', from, to };
    } else if (r === 'all') {
      currentRange = { type: 'all' };
    } else if (r.startsWith('year-')) {
      currentRange = { type: 'year', y: parseInt(r.split('-')[1]) };
    } else {
      currentRange = { type: 'days', n: parseInt(r) };
    }
    document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
});

// 初始化平台按鈕視覺狀態（避免重整後按鈕停在 FB 但實際是別的平台）
document.querySelectorAll('.pf-btn').forEach(b => {
  const active = b.dataset.pf === currentPlatform;
  b.classList.toggle('active', active);
  b.style.background = active ? 'var(--accent)' : 'transparent';
  b.style.color = active ? 'white' : 'var(--text)';
});

render();
</script>
</body>
</html>
