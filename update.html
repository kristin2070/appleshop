<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>🔄 快速更新 · 燦坤五甲店 Apple Shop</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root {
    --bg: #0a0a0a;
    --card: #1c1c1e;
    --text: #f0f0f0;
    --muted: #8e8e93;
    --border: #2c2c2e;
    --line: #06c755;
    --fb: #1877f2;
    --google: #fbbc04;
    --rating: #ff9500;
    --success: #30d158;
    --danger: #ff453a;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    padding: 24px 16px 60px;
    max-width: 520px;
    margin: 0 auto;
    min-height: 100vh;
  }
  header { text-align: center; margin-bottom: 8px; }
  h1 { font-size: 24px; margin: 0 0 4px; }
  .subtitle { color: var(--muted); font-size: 13px; margin-bottom: 24px; text-align: center; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 14px;
    position: relative;
  }
  .row-head {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .icon-badge {
    width: 36px; height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .b-line   { background: rgba(6,199,85,.15); color: var(--line); }
  .b-fb     { background: rgba(24,119,242,.15); color: var(--fb); }
  .b-google { background: rgba(251,188,4,.15); color: var(--google); }
  .b-rating { background: rgba(255,149,0,.15); color: var(--rating); }

  .label { font-size: 15px; font-weight: 600; }
  .hint  { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .current {
    margin-left: auto;
    font-size: 12px;
    color: var(--muted);
    text-align: right;
  }
  .current b { color: var(--text); font-size: 16px; }

  .input-row {
    display: flex;
    gap: 8px;
  }
  input[type="number"] {
    flex: 1;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: #000;
    color: var(--text);
    font-size: 17px;
    outline: none;
    font-family: inherit;
    -moz-appearance: textfield;
  }
  input::-webkit-outer-spin-button,
  input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  input:focus { border-color: var(--rating); }

  .btn {
    padding: 12px 18px;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    font-family: inherit;
    white-space: nowrap;
  }
  .btn:active { transform: scale(0.96); }
  .btn.line   { background: var(--line); color: white; }
  .btn.fb     { background: var(--fb); color: white; }
  .btn.google { background: var(--google); color: #000; }
  .btn.rating { background: var(--rating); color: white; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .status {
    font-size: 12px;
    margin-top: 8px;
    min-height: 16px;
  }
  .status.ok { color: var(--success); }
  .status.err { color: var(--danger); }

  .all-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, #ff9500, #ff2d55);
    color: white;
    border: none;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    box-shadow: 0 4px 20px rgba(255,149,0,.3);
  }
  .all-btn:active { transform: scale(0.98); }

  .links {
    text-align: center;
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }
  .links a {
    color: var(--muted);
    font-size: 13px;
    text-decoration: none;
    margin: 0 10px;
  }
  .links a:hover { color: var(--rating); }

  .last-update {
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    margin-top: 16px;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--success);
    color: white;
    padding: 12px 24px;
    border-radius: 24px;
    font-size: 14px;
    font-weight: 600;
    box-shadow: 0 8px 24px rgba(0,0,0,.4);
    transition: transform 0.3s;
    z-index: 100;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.err { background: var(--danger); }
</style>
</head>
<body>

<header>
  <h1>🔄 快速更新後台數據</h1>
  <div class="subtitle">燦坤五甲店 Apple Shop</div>
</header>

<!-- LINE -->
<div class="card">
  <div class="row-head">
    <div class="icon-badge b-line">💬</div>
    <div>
      <div class="label">LINE 好友數</div>
      <div class="hint">LINE 官方帳號後台可查</div>
    </div>
    <div class="current">目前<br><b id="cur-line">—</b></div>
  </div>
  <div class="input-row">
    <input type="number" id="in-line" placeholder="輸入新數字" inputmode="numeric">
    <button class="btn line" data-key="rd-line" data-input="in-line" data-cur="cur-line">更新</button>
  </div>
  <div class="status" id="st-line"></div>
</div>

<!-- FB -->
<div class="card">
  <div class="row-head">
    <div class="icon-badge b-fb">👍</div>
    <div>
      <div class="label">FB 追蹤數</div>
      <div class="hint">FB 粉專頁面可查</div>
    </div>
    <div class="current">目前<br><b id="cur-fb">—</b></div>
  </div>
  <div class="input-row">
    <input type="number" id="in-fb" placeholder="輸入新數字" inputmode="numeric">
    <button class="btn fb" data-key="rd-fb" data-input="in-fb" data-cur="cur-fb">更新</button>
  </div>
  <div class="status" id="st-fb"></div>
</div>

<!-- Google 評論 -->
<div class="card">
  <div class="row-head">
    <div class="icon-badge b-google">⭐</div>
    <div>
      <div class="label">Google 評論則數</div>
      <div class="hint">Google 搜尋店名可查</div>
    </div>
    <div class="current">目前<br><b id="cur-google">—</b></div>
  </div>
  <div class="input-row">
    <input type="number" id="in-google" placeholder="輸入新數字" inputmode="numeric">
    <button class="btn google" data-key="rd-google" data-input="in-google" data-cur="cur-google">更新</button>
  </div>
  <div class="status" id="st-google"></div>
</div>

<!-- Google 星等 -->
<div class="card">
  <div class="row-head">
    <div class="icon-badge b-rating">🌟</div>
    <div>
      <div class="label">Google 平均星等</div>
      <div class="hint">直接輸入 4.8，會自動 ×10</div>
    </div>
    <div class="current">目前<br><b id="cur-rating">—</b></div>
  </div>
  <div class="input-row">
    <input type="number" id="in-rating" placeholder="例：4.8" step="0.1" inputmode="decimal">
    <button class="btn rating" data-key="rd-google-rating" data-input="in-rating" data-cur="cur-rating" data-x10="1">更新</button>
  </div>
  <div class="status" id="st-rating"></div>
</div>

<!-- 一鍵全部更新 -->
<button class="all-btn" id="update-all">⚡ 一鍵更新全部（有填的才會送出）</button>

<div class="last-update" id="last-update"></div>

<div class="links">
  <a href="stats.html">📊 儀表板</a>
  <a href="index.html">📱 落地頁</a>
  <a href="dm.html">🖨️ DM</a>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://tsann-counter.magicbrian1206.workers.dev';
const NS = '燦坤五甲店-apple-shop-appleshop';

const keys = [
  { key: 'rd-line',          curId: 'cur-line',   display: v => v },
  { key: 'rd-fb',            curId: 'cur-fb',     display: v => v },
  { key: 'rd-google',        curId: 'cur-google', display: v => v },
  { key: 'rd-google-rating', curId: 'cur-rating', display: v => (Number(v)/10).toFixed(1) + ' ⭐' },
];

// 讀目前值
async function loadCurrent() {
  for (const k of keys) {
    try {
      const r = await fetch(`${API}/get/${encodeURIComponent(NS)}/${k.key}`);
      const txt = (await r.text()).trim();
      const n = Number(txt);
      document.getElementById(k.curId).textContent = isNaN(n) || !txt ? '—' : k.display(n);
    } catch (e) {
      document.getElementById(k.curId).textContent = '—';
    }
  }
  const now = new Date();
  document.getElementById('last-update').textContent =
    `📡 最後讀取：${now.toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'})}`;
}

// 更新單個
async function updateOne(key, value, statusId, curId, display) {
  const st = document.getElementById(statusId);
  st.className = 'status';
  st.textContent = '更新中…';
  try {
    const url = `${API}/set/${encodeURIComponent(NS)}/${key}?v=${encodeURIComponent(value)}`;
    const r = await fetch(url);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    st.className = 'status ok';
    st.textContent = `✅ 已更新為 ${display(value)} · ${new Date().toLocaleTimeString('zh-TW')}`;
    document.getElementById(curId).textContent = display(value);
    return true;
  } catch (e) {
    st.className = 'status err';
    st.textContent = `❌ 更新失敗：${e.message}`;
    return false;
  }
}

// Toast
function toast(msg, isErr = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isErr ? ' err' : '');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.className = 'toast', 2400);
}

// 綁定單個按鈕
document.querySelectorAll('.btn[data-key]').forEach(btn => {
  btn.addEventListener('click', async () => {
    const key = btn.dataset.key;
    const input = document.getElementById(btn.dataset.input);
    const curId = btn.dataset.cur;
    let val = input.value.trim();
    if (!val) { toast('請先輸入數字', true); input.focus(); return; }

    // 星等 ×10
    if (btn.dataset.x10) {
      val = Math.round(Number(val) * 10);
      if (isNaN(val)) { toast('星等格式錯誤', true); return; }
    }

    const k = keys.find(x => x.key === key);
    btn.disabled = true;
    const ok = await updateOne(key, val, 'st-' + btn.dataset.input.split('-')[1], curId, k.display);
    btn.disabled = false;
    if (ok) {
      toast('✅ 更新成功');
      input.value = '';
    } else {
      toast('❌ 更新失敗', true);
    }
  });
});

// 一鍵全部更新
document.getElementById('update-all').addEventListener('click', async () => {
  const btn = document.getElementById('update-all');
  btn.disabled = true;
  btn.textContent = '⏳ 更新中…';

  let success = 0, fail = 0, skip = 0;
  for (const el of document.querySelectorAll('.btn[data-key]')) {
    const input = document.getElementById(el.dataset.input);
    let val = input.value.trim();
    if (!val) { skip++; continue; }
    if (el.dataset.x10) val = Math.round(Number(val) * 10);
    const k = keys.find(x => x.key === el.dataset.key);
    const statusId = 'st-' + el.dataset.input.split('-')[1];
    const ok = await updateOne(el.dataset.key, val, statusId, el.dataset.cur, k.display);
    if (ok) { success++; input.value = ''; } else { fail++; }
  }

  btn.disabled = false;
  btn.textContent = '⚡ 一鍵更新全部（有填的才會送出）';
  if (success === 0 && fail === 0) {
    toast('沒有任何欄位填數字', true);
  } else {
    toast(`✅ 成功 ${success} 項${fail ? ` · 失敗 ${fail}` : ''}${skip ? ` · 跳過 ${skip}` : ''}`, fail > 0);
  }
});

// Enter 送出當前欄位
document.querySelectorAll('input[type="number"]').forEach(inp => {
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const btn = inp.parentElement.querySelector('.btn');
      btn.click();
    }
  });
});

loadCurrent();
</script>
</body>
</html>
